name: Build and Release

on:
  push:
    tags:
      - "v*.*.*" # 例如 v1.0.0 会触发此工作流
  workflow_dispatch: # 允许手动触发工作流

jobs:
  build:
    name: Build & Release
    runs-on: windows-latest

    permissions:
      contents: write # 允许创建Release

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore Packages
      run: nuget restore Replace-a-Face.sln

    - name: Build Solution
      run: msbuild Replace-a-Face.sln /p:Configuration=Release /p:Platform="Any CPU" /m

    - name: Package Application
      run: |
        Compress-Archive -Path Replace-a-Face\bin\Release\* -DestinationPath Replace-a-Face.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      # 仅在打Tag发布的时候创建Release，如果是通过workflow_dispatch手动触发也可以将文件上传为artifact或者直接发布
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: Replace-a-Face.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
